name: 기능 구현
description: 새로운 기능을 구현할 때 사용합니다.
title: "[FEAT] "
labels: ["type: feature"]
body:
  - type: markdown
    attributes:
      value: |
        기능 구현 이슈입니다.
        운영자가 AI에게 위임할 범위를 설정하고, AI가 경계에서 어떻게 행동할지를 정의하는 인터페이스와 관련된 기능을 다룹니다.

  - type: textarea
    id: background
    attributes:
      label: 배경
      description: 이 기능이 왜 필요한지 적어주세요.
      placeholder: "예: 운영자가 AI 자율 실행 범위를 직접 정의할 수 있어야 위임 계약이 의미 있게 작동합니다."
    validations:
      required: true

  - type: textarea
    id: tasks
    attributes:
      label: 작업 내용
      description: 구현해야 할 작업을 적어주세요.
      placeholder: |
        - 위임 범위 설정 UI 구현
        - 경계 조건 도달 시 확인 요청 플로우 구현
        - 계약 저장 및 불러오기 API 연동
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: 완료 조건
      description: 이 이슈가 끝났다고 판단할 수 있는 기준을 체크박스로 적어주세요.
      placeholder: |
        - [ ] 운영자가 허용 작업 유형을 선택할 수 있다.
        - [ ] AI가 허용 범위를 초과할 때 확인 요청이 발생한다.
        - [ ] 계약 내용이 저장되고 재진입 시 복원된다.
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: 우선순위
      options:
        - p0
        - p1
        - p2
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: 작업 영역
      options:
        - frontend
        - backend
        - agent
        - auth
        - infra
    validations:
      required: true

  - type: textarea
    id: references
    attributes:
      label: 참고 자료
      description: 화면 목업, 문서, API 설계, 회의 내용 등이 있으면 적어주세요.
      placeholder: |
        - Figma:
        - API 설계 문서:
        - 관련 회의 메모:

  - type: textarea
    id: risk
    attributes:
      label: 예상 리스크
      description: 막힐 수 있는 부분이나 미리 결정해야 하는 내용을 적어주세요.
      placeholder: "예: 경계 조건 트리거 방식을 이벤트 기반으로 할지 폴링 방식으로 할지 결정 필요"
