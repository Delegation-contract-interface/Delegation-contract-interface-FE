name: 버그 수정
description: 오류나 의도와 다른 동작을 수정할 때 사용합니다.
title: "[BUG] "
labels: ["type: bug"]
body:
  - type: markdown
    attributes:
      value: |
        버그 수정 이슈입니다.
        재현 방법을 최대한 구체적으로 적어주세요.

  - type: textarea
    id: problem
    attributes:
      label: 문제 상황
      description: 어떤 문제가 발생했는지 적어주세요.
      placeholder: "예: 위임 범위를 저장한 후 AI가 경계 조건을 무시하고 동작합니다."
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: 재현 방법
      description: 같은 문제를 다시 확인할 수 있는 순서를 적어주세요.
      placeholder: |
        1. 위임 계약 생성 화면 진입
        2. 자율 실행 범위를 '파일 읽기'만 허용으로 설정
        3. 계약 저장
        4. AI 에이전트 실행 시 파일 쓰기까지 수행됨
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 기대 결과
      description: 원래 어떻게 동작해야 하나요?
      placeholder: "예: 허용되지 않은 작업 시도 시 운영자에게 확인 요청이 발생해야 합니다."
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 실제 결과
      description: 실제로는 어떻게 동작했나요?
      placeholder: "예: 확인 없이 파일 쓰기가 실행되었습니다."
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: 우선순위
      options:
        - p0
        - p1
        - p2
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: 발생 영역
      options:
        - frontend
        - backend
        - agent
        - auth
        - infra
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: 실행 환경
      description: 문제가 발생한 환경을 적어주세요.
      placeholder: "예: Chrome 125 / macOS 14 / Node 20"

  - type: textarea
    id: screenshots
    attributes:
      label: 스크린샷 또는 로그
      description: 가능하면 스크린샷, 에러 로그, 콘솔 출력을 붙여주세요.
      render: shell
